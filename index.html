<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DP / Flyer Generator</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="wrap">
      <h1>Upload your photo → Download your flyer</h1>
      <p class="sub">
        Choose a photo, adjust (optional), then download the final PNG.
      </p>

      <section class="panel">
        <div class="controls">
          <label class="file">
            <input id="file" type="file" accept="image/*" />
            <span>Choose photo</span>
          </label>

          <div class="row">
            <label
              >Zoom
              <input
                id="zoom"
                type="range"
                min="1"
                max="3"
                value="1.2"
                step="0.01"
              />
            </label>
          </div>

          <div class="row">
            <label
              >Move X
              <input
                id="offx"
                type="range"
                min="-400"
                max="400"
                value="0"
                step="1"
              />
            </label>
          </div>

          <div class="row">
            <label
              >Move Y
              <input
                id="offy"
                type="range"
                min="-400"
                max="400"
                value="0"
                step="1"
              />
            </label>
          </div>

          <div class="btns">
            <button id="reset" type="button">Reset</button>
            <button id="download" type="button" class="primary" disabled>
              Download PNG
            </button>
          </div>

          <p class="hint">
            Tip: If you don't want to adjust, just upload and download.
          </p>
        </div>

        <div class="preview">
          <canvas
            id="c"
            width="2048"
            height="2048"
            aria-label="Preview canvas"
          ></canvas>
          <p class="small">Preview (tap/zoom your browser if needed)</p>
        </div>
      </section>

      <footer class="foot">
        <p class="small">
          This runs in your browser. Your photo is not uploaded anywhere by this
          page.
        </p>
      </footer>
    </main>

    <script src="app.js"></script>
  </body>
</html>
